apiVersion: v1
kind: ServiceAccount
metadata:
  name: dsaf-admin

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dsaf-admin-binding
subjects:
  - kind: ServiceAccount
    name: dsaf-admin
    namespace: default
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io